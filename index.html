  <style>
    /* ── Reset & Base ── */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP',
                   'Noto Sans SC', 'Noto Sans KR', 'Helvetica Neue', sans-serif;
      background: #f0f9ff;
      min-height: 100vh;
    }

    /* ── Screen transition ── */
    .screen { animation: fadeUp .22s ease-out both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Touch interaction ── */
    .tap { transition: transform .1s, opacity .1s; cursor: pointer; user-select: none; -webkit-user-select: none; }
    .tap:active { transform: scale(.96); opacity: .84; }

    /* ── Checkbox labels ── */
    .chk-label { cursor: pointer; user-select: none; -webkit-user-select: none; }

    /* ── Perforated tear line (consumer/staff divider) ── */
    .tear {
      display: flex; align-items: center; gap: .5rem;
      margin: 1.5rem 0 1rem;
    }
    .tear::before, .tear::after {
      content: ''; flex: 1;
      border-top: 2px dashed #cbd5e1;
    }
    .tear-label {
      font-size: .6rem; font-weight: 700; color: #94a3b8;
      letter-spacing: .12em; text-transform: uppercase; white-space: nowrap;
    }

    /* ── Staff prescription zone ── */
    .staff-zone {
      background: #f8fafc;
      border: 1.5px dashed #94a3b8;
      border-radius: 1rem;
      padding: 1.25rem;
    }

    /* ── Emergency pulse ── */
    @keyframes em-pulse { 0%,100%{background:#fef2f2} 50%{background:#fee2e2} }
    .em-pulse { animation: em-pulse 2.5s ease-in-out infinite; }

    /* ── Print styles ── */
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .screen { animation: none !important; }
      .staff-zone {
        border: 1.5px solid #64748b !important;
        background: #f8fafc !important;
        break-inside: avoid;
      }
      .tear::before, .tear::after { border-color: #64748b !important; }
      .tear-label { color: #64748b !important; }
      .product-card { break-inside: avoid; }
    }
  </style>
</head>

// ══════════════════════════════════════════════════════════════════════════
//
//   APPLICATION CODE  ／  アプリケーションコード
//   ─────────────────────────────────────────────────────────────────────
//   ロジック変更以外は編集不要
//
// ══════════════════════════════════════════════════════════════════════════

// ── State ─────────────────────────────────────────────────────────────────
const state = {
  lang:         "en",
  screen:       "lang", // lang | screening | symptoms | result | emergency
  rfChecked:    new Set(),  // checked red-flag indices
  bgChecked:    new Set(),  // checked background condition indices
  // symptomPath: [{fromNodeId, questionJa, chosenLabel, chosenLabelJa}, …]
  symptomPath:  [],
  currentNodeId:"root",
  resultNodeId: null,
};
// Option cache — populated on each renderSymptoms call for index-based onclick
let _opts = [];

// ── Helpers ───────────────────────────────────────────────────────────────
const t  = k   => UI[state.lang]?.[k]  ?? UI.en[k]  ?? k;
const tA = k   => UI[state.lang]?.[k]  ?? UI.en[k]  ?? [];
const tx = obj => obj?.[state.lang]    ?? obj?.en    ?? "";

function activeConds() {
  const s = new Set();
  state.bgChecked.forEach(i => { if (BG_KEYS[i]) s.add(BG_KEYS[i]); });
  return s;
}
function prodHasCaution(pid) {
  const p = PRODUCTS[pid]; if (!p) return false;
  const ac = activeConds();
  return p.cautionFor.some(c => ac.has(c));
}
function anyHasCaution(pids) { return pids.some(p => prodHasCaution(p)); }
// Diabetes (idx 3) and drug allergy (idx 4) always trigger pharmacist consult
function alwaysConsult() { return state.bgChecked.has(3) || state.bgChecked.has(4); }

// ── Master render ─────────────────────────────────────────────────────────
function render() {
  const fns = {
    lang:      renderLang,
    screening: renderScreening,
    symptoms:  renderSymptoms,
    result:    renderResult,
    emergency: renderEmergency,
  };
  document.getElementById("app").innerHTML = (fns[state.screen] || renderLang)();
  window.scrollTo(0, 0);
}

  const node = SYMPTOM_NODES[state.currentNodeId];

  const crumbs = state.symptomPath.length
    ? `<div class="flex flex-wrap items-center gap-1.5 mb-4 px-1">

// ══════════════════════════════════════════════════════════════════════════
//  EVENT HANDLERS  (called from onclick="…" attributes in the HTML)
// ══════════════════════════════════════════════════════════════════════════

function selectLang(lang) {
  Object.assign(state, {
    lang, screen:"screening",
    rfChecked: new Set(), bgChecked: new Set(),
    symptomPath:[], currentNodeId:"root", resultNodeId:null,
  });
  render();
}

function toggleRF(i) {
  state.rfChecked.has(i) ? state.rfChecked.delete(i) : state.rfChecked.add(i);
  render();
}
function toggleBG(i) {
  state.bgChecked.has(i) ? state.bgChecked.delete(i) : state.bgChecked.add(i);
  render();
}

function nextFromScreening() {
  state.screen = state.rfChecked.size > 0 ? "emergency" : "symptoms";
  if (state.screen === "symptoms") {
    state.currentNodeId = "root";
    state.symptomPath   = [];
  }
  render();
}

function pickOption(idx) {
  const opt  = _opts[idx]; if (!opt) return;
  const node = SYMPTOM_NODES[state.currentNodeId];
  state.symptomPath.push({
    fromNodeId:    state.currentNodeId,
    questionJa:    node?.questionJa || "",
    chosenLabel:   tx(opt.label),
    chosenLabelJa: opt.labelJa,
  });
  if      (RESULT_NODES[opt.next])  { state.resultNodeId = opt.next; state.screen = "result"; }
  else if (SYMPTOM_NODES[opt.next]) { state.currentNodeId = opt.next; }
  else { console.warn("Unknown node:", opt.next); }
  render();
}

function goBack() {
  if (state.screen === "result") {
    const last = state.symptomPath.pop();
    state.currentNodeId = last?.fromNodeId || "root";
    state.resultNodeId  = null;
    state.screen        = "symptoms";
  } else if (state.screen === "symptoms") {
    if (state.symptomPath.length === 0) {
      state.screen = "screening";
    } else {
      const last = state.symptomPath.pop();
      state.currentNodeId = last?.fromNodeId || "root";
    }
  }
  render();
}

function goScreening() { state.screen = "screening"; render(); }

function goLang() {
  Object.assign(state, {
    lang:"en", screen:"lang",
    rfChecked: new Set(), bgChecked: new Set(),
    symptomPath:[], currentNodeId:"root", resultNodeId:null,
  });
  render();
}

// ── Initialise ────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>

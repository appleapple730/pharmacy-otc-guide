  <style>
    /* ── Reset & Base ── */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP',
                   'Noto Sans SC', 'Noto Sans KR', 'Helvetica Neue', sans-serif;
      background: #f0f9ff;
      min-height: 100vh;
    }

    /* ── Screen transition ── */
    .screen { animation: fadeUp .22s ease-out both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Touch interaction ── */
    .tap { transition: transform .1s, opacity .1s; cursor: pointer; user-select: none; -webkit-user-select: none; }
    .tap:active { transform: scale(.96); opacity: .84; }

    /* ── Checkbox labels ── */
    .chk-label { cursor: pointer; user-select: none; -webkit-user-select: none; }

    /* ── Perforated tear line (consumer/staff divider) ── */
    .tear {
      display: flex; align-items: center; gap: .5rem;
      margin: 1.5rem 0 1rem;
    }
    .tear::before, .tear::after {
      content: ''; flex: 1;
      border-top: 2px dashed #cbd5e1;
    }
    .tear-label {
      font-size: .6rem; font-weight: 700; color: #94a3b8;
      letter-spacing: .12em; text-transform: uppercase; white-space: nowrap;
    }

    /* ── Staff prescription zone ── */
    .staff-zone {
      background: #f8fafc;
      border: 1.5px dashed #94a3b8;
      border-radius: 1rem;
      padding: 1.25rem;
    }

    /* ── Emergency pulse ── */
    @keyframes em-pulse { 0%,100%{background:#fef2f2} 50%{background:#fee2e2} }
    .em-pulse { animation: em-pulse 2.5s ease-in-out infinite; }

    /* ── Print styles ── */
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .screen { animation: none !important; }
      .staff-zone {
        border: 1.5px solid #64748b !important;
        background: #f8fafc !important;
        break-inside: avoid;
      }
      .tear::before, .tear::after { border-color: #64748b !important; }
      .tear-label { color: #64748b !important; }
      .product-card { break-inside: avoid; }
    }
  </style>
</head>

// ── State ─────────────────────────────────────────────────────────────────
const state = {
  lang:         "en",
  screen:       "lang", // lang | screening | symptoms | result | emergency
  rfChecked:    new Set(),  // checked red-flag indices
  bgChecked:    new Set(),  // checked background condition indices
  // symptomPath: [{fromNodeId, questionJa, chosenLabel, chosenLabelJa}, …]
  symptomPath:  [],
  currentNodeId:"root",
  resultNodeId: null,
};
// Option cache — populated on each renderSymptoms call for index-based onclick
let _opts = [];

// ── Helpers ───────────────────────────────────────────────────────────────
const t  = k   => UI[state.lang]?.[k]  ?? UI.en[k]  ?? k;
const tA = k   => UI[state.lang]?.[k]  ?? UI.en[k]  ?? [];
const tx = obj => obj?.[state.lang]    ?? obj?.en    ?? "";

function activeConds() {
  const s = new Set();
  state.bgChecked.forEach(i => { if (BG_KEYS[i]) s.add(BG_KEYS[i]); });
  return s;
}
function prodHasCaution(pid) {
  const p = PRODUCTS[pid]; if (!p) return false;
  const ac = activeConds();
  return p.cautionFor.some(c => ac.has(c));
}
function anyHasCaution(pids) { return pids.some(p => prodHasCaution(p)); }
// Diabetes (idx 3) and drug allergy (idx 4) always trigger pharmacist consult
function alwaysConsult() { return state.bgChecked.has(3) || state.bgChecked.has(4); }

// ── Master render ─────────────────────────────────────────────────────────
function render() {
  const fns = {
    lang:      renderLang,
    screening: renderScreening,
    symptoms:  renderSymptoms,
    result:    renderResult,
    emergency: renderEmergency,
  };
  document.getElementById("app").innerHTML = (fns[state.screen] || renderLang)();
  window.scrollTo(0, 0);
}

}

    const checked = state.rfChecked.has(i);
    return `

              ${checked ? "bg-red-50" : "hover:bg-slate-50"}">
  <input type="checkbox" onchange="toggleRF(${i})" ${checked ? "checked" : ""}
         class="mt-0.5 w-5 h-5 flex-shrink-0 accent-red-500 cursor-pointer">
  <span class="text-sm text-slate-700 leading-snug">${item}</span>
</label>`;
  }).join("");

  const bgRows = bgItems.map((item, i) => {
    const checked = state.bgChecked.has(i);
    return `
<label class="chk-label flex items-start gap-3 p-3.5 rounded-xl transition-colors
              ${checked ? "bg-amber-50" : "hover:bg-slate-50"}">

// ── SCREEN: Symptoms ──────────────────────────────────────────────────────
function renderSymptoms() {
  const node = SYMPTOM_NODES[state.currentNodeId];
  if (!node) return `<div class="p-12 text-center text-slate-400">Node not found.</div>`;
  _opts = node.options;

  const crumbs = state.symptomPath.length
    ? `<div class="flex flex-wrap items-center gap-1.5 mb-4 px-1">
        ${state.symptomPath.map((s, i) =>
          (i > 0 ? `<span class="text-slate-300 text-xs">›</span>` : "") +
          `<span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2.5 py-1 rounded-full">${s.chosenLabel}</span>`
        ).join("")}
      </div>`
    : "";

  const optBtns = node.options.map((opt, i) => `
<button onclick="pickOption(${i})"
        class="tap w-full bg-white border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50
               rounded-2xl p-4 text-left shadow-sm transition-all flex items-center gap-3 group">
  <span class="flex-1">
    <span class="block text-slate-800 font-medium text-sm leading-snug">${tx(opt.label)}</span>
    <span class="block text-slate-400 text-xs mt-0.5">${opt.labelJa}</span>
  </span>
  <span class="text-blue-300 group-hover:text-blue-500 text-xl transition-colors flex-shrink-0">›</span>
</button>`).join("");

  return `
<div class="screen min-h-screen bg-slate-50">
  ${hdr(t("sympTitle"), state.symptomPath.length > 0 ? "goBack()" : "goScreening()")}
  <div class="max-w-lg mx-auto px-4 py-5">
    ${crumbs}
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-4">
      <div class="text-4xl mb-3">${node.icon || "💬"}</div>
      <h2 class="text-xl font-bold text-slate-800 leading-snug">${tx(node.question)}</h2>
      <p class="text-xs text-slate-400 mt-2 font-medium">${node.questionJa}</p>
    </div>
    <div class="space-y-2.5">${optBtns}</div>
  </div>
</div>`;
}

// ── SCREEN: Result ────────────────────────────────────────────────────────

  const pids           = rNode.products;

    </div>
  </div>
  ${hasCaution && tx(p.cautionDesc) ? `
  <div class="mx-4 mb-4 bg-amber-50 border border-amber-200 rounded-xl p-3 flex gap-2 items-start">
    <span class="flex-shrink-0 text-base">⚠️</span>
    <p class="text-xs text-amber-800 leading-snug">
      <strong>${t("resCautionLabel")}:</strong> ${tx(p.cautionDesc)}
    </p>
  </div>` : ""}
</div>`;
  }).join("");

  // ── User-language symptom path summary
  const pathRows = state.symptomPath.map(s =>
    `<div class="flex items-start gap-2 text-sm">
      <span class="text-blue-400 font-bold flex-shrink-0 mt-px">›</span>
      <span class="text-slate-700 leading-snug">${s.chosenLabel}</span>
    </div>`
  ).join("");

  // ── Staff section: Japanese
  const staffPath = state.symptomPath.map(s =>
    `<div class="flex items-start gap-2">
      <span class="text-blue-500 font-extrabold flex-shrink-0 mt-px">›</span>
      <div class="text-sm leading-snug">
        <span class="font-bold text-slate-900">${s.chosenLabelJa}</span>
        <span class="text-slate-400 text-xs ml-2">(${s.chosenLabel})</span>
      </div>
    </div>`
  ).join("");

  const staffProds = pids.map(pid => {
    const p = PRODUCTS[pid]; if (!p) return "";
    return `<span class="inline-block bg-blue-100 text-blue-800 font-extrabold text-base
                         px-3.5 py-1.5 rounded-xl mr-2 mb-2">${p.nameJa}</span>`;
  }).join("");

  const bgLabels = [...state.bgChecked].map(i => BG_JA[i]).filter(Boolean);
  const staffConds = bgLabels.length
    ? `<div class="pt-3 mt-3 border-t border-slate-200">
        <div class="text-xs font-extrabold text-slate-500 uppercase tracking-wide mb-2">
          ${t("resCondJaLabel")}
        </div>
        <div>${bgLabels.map(l =>
          `<span class="inline-block bg-amber-100 text-amber-800 text-xs font-semibold
                        px-2.5 py-1 rounded-lg mr-1 mb-1">${l}</span>`
        ).join("")}</div>
      </div>`
    : "";

  return `
<div class="screen min-h-screen bg-slate-50">
  ${hdr(t("resTitle"), "goBack()")}
  <div class="max-w-lg mx-auto px-4 py-5 space-y-4">

    <!-- Pharmacist alert banner -->
    ${showPharmAlert ? `
    <div class="bg-red-50 border-2 border-red-300 rounded-2xl p-4 flex gap-3 items-start">
      <span class="text-2xl flex-shrink-0">⚠️</span>
      <div>
        <div class="font-bold text-red-700 text-sm">${t("resAlertTitle")}</div>
        <div class="text-red-600 text-xs mt-1 leading-snug">${t("resAlertBody")}</div>
      </div>
    </div>` : ""}

    <!-- Symptom path (selected language) -->
    <div class="bg-white rounded-2xl shadow-sm p-4">
      <div class="text-xs font-extrabold text-slate-500 uppercase tracking-widest mb-3">
        ${t("resPathLabel")}
      </div>
      <div class="space-y-2">${pathRows}</div>
    </div>

    <!-- Product cards -->
    <div class="space-y-3">${cards}</div>

    <!-- Perforated divider (✂) -->
    <div class="tear">
      <span class="tear-label">✂ For Pharmacy Staff ／ スタッフ用 ✂</span>
    </div>

    <!-- Staff zone: shown on screen AND on print -->
    <div class="staff-zone">
      <div class="flex items-center gap-2 mb-1">
        <h3 class="font-extrabold text-slate-700 text-sm">${t("resStaffTitle")}</h3>
      </div>
      <p class="text-xs text-slate-500 italic mb-4">${t("resStaffNote")}</p>

      <!-- Symptom path (Japanese) -->
      <div class="mb-3">
        <div class="text-xs font-extrabold text-slate-500 uppercase tracking-wide mb-2">
          ${t("resPathJaLabel")}
        </div>
        <div class="space-y-1.5">${staffPath}</div>
      </div>

      <!-- Recommended products (Japanese) -->
      <div class="pt-3 border-t border-slate-200 mb-2">
        <div class="text-xs font-extrabold text-slate-500 uppercase tracking-wide mb-2">
          ${t("resProdJaLabel")}
        </div>
        <div>${staffProds}</div>
      </div>

      <!-- Disclosed background conditions (Japanese) -->
      ${staffConds}

      <!-- Pharmacist consult badge -->
      ${showPharmAlert ? `
      <div class="pt-3 mt-1 border-t border-slate-200">
        <span class="inline-flex items-center gap-1.5 bg-red-100 text-red-700
                     text-xs font-extrabold px-3 py-2 rounded-xl">
          ⚠️ ${t("resConsultBadge")}
        </span>
      </div>` : ""}
    </div>

    <!-- Action buttons (hidden on print) -->
    <div class="flex gap-3 pb-8 no-print">
      <button onclick="window.print()"
              class="tap flex-1 bg-white border-2 border-slate-200 text-slate-600
                     font-semibold py-3 rounded-xl text-sm hover:bg-slate-50 transition-all">
        ${t("resPrintBtn")}
      </button>
      <button onclick="goLang()"
              class="tap flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl text-sm
                     shadow-md hover:bg-blue-700 transition-colors">
        ${t("restartBtn")}
      </button>
    </div>
  </div>
</div>`;
}

// ── SCREEN: Emergency ─────────────────────────────────────────────────────
function renderEmergency() {
  const emLang = (flag, label, msg) =>
    `<div class="p-4 border-b border-slate-100 last:border-b-0">
      <div class="text-xs font-bold text-slate-500 mb-1">${flag} ${label}</div>
      <p class="text-sm text-slate-700 leading-snug">${msg}</p>
    </div>`;

  return `
<div class="screen min-h-screen">
  <!-- Emergency header -->
  <div class="bg-red-600 text-white text-center py-8 px-4">
    <div class="text-6xl mb-3">🚨</div>
    <h1 class="text-xl font-extrabold leading-snug">${t("emTitle")}</h1>
  </div>

  <div class="max-w-lg mx-auto px-4 py-5 space-y-4">
    <!-- Main message -->
    <div class="em-pulse rounded-2xl border-2 border-red-200 p-5">
      <p class="text-red-700 font-bold text-base leading-relaxed mb-2">${t("emMsg")}</p>
      <p class="text-red-600 text-sm leading-snug">${t("emAction")}</p>
      <div class="mt-4 bg-red-600 text-white text-center font-extrabold text-2xl
                  py-3.5 rounded-xl shadow-lg tracking-wide">
        ${t("emNum")}
      </div>
    </div>

    <!-- Multilingual notice panel -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      ${emLang("🇺🇸","English",
        "Please call 119 (ambulance) or go to the nearest hospital immediately. Do NOT take any OTC medicine.")}
      ${emLang("🇨🇳","中文",
        "请立即拨打119（救护车）或前往最近的医院。请勿服用任何非处方药物。")}
      ${emLang("🇰🇷","한국어",
        "즉시 119(구급차)에 전화하거나 가장 가까운 병원으로 가세요. 어떤 OTC 약도 복용하지 마세요.")}
      <div class="p-4 bg-slate-50">
        <div class="text-xs font-bold text-slate-600 mb-1">🇯🇵 スタッフへ（For Staff）</div>
        <p class="text-sm text-slate-800 font-semibold leading-relaxed">${t("emStaff")}</p>
      </div>
    </div>

    <button onclick="goLang()"
            class="tap no-print w-full bg-slate-700 text-white font-bold py-4 rounded-2xl
                   text-sm shadow-md hover:bg-slate-800 transition-colors">
      ${t("restartBtn")}
    </button>
  </div>
</div>`;
}


// ══════════════════════════════════════════════════════════════════════════
//  EVENT HANDLERS  (called from onclick="…" attributes in the HTML)
// ══════════════════════════════════════════════════════════════════════════

function selectLang(lang) {
  Object.assign(state, {
    lang, screen:"screening",
    rfChecked: new Set(), bgChecked: new Set(),
    symptomPath:[], currentNodeId:"root", resultNodeId:null,
  });
  render();
}

function toggleRF(i) {
  state.rfChecked.has(i) ? state.rfChecked.delete(i) : state.rfChecked.add(i);
  render();
}
function toggleBG(i) {
  state.bgChecked.has(i) ? state.bgChecked.delete(i) : state.bgChecked.add(i);
  render();
}

function nextFromScreening() {
  state.screen = state.rfChecked.size > 0 ? "emergency" : "symptoms";
  if (state.screen === "symptoms") {
    state.currentNodeId = "root";
    state.symptomPath   = [];
  }
  render();
}

function pickOption(idx) {
  const opt  = _opts[idx]; if (!opt) return;
  const node = SYMPTOM_NODES[state.currentNodeId];
  state.symptomPath.push({
    fromNodeId:    state.currentNodeId,
    questionJa:    node?.questionJa || "",
    chosenLabel:   tx(opt.label),
    chosenLabelJa: opt.labelJa,
  });
  if      (RESULT_NODES[opt.next])  { state.resultNodeId = opt.next; state.screen = "result"; }
  else if (SYMPTOM_NODES[opt.next]) { state.currentNodeId = opt.next; }
  else { console.warn("Unknown node:", opt.next); }
  render();
}

function goBack() {
  if (state.screen === "result") {
    const last = state.symptomPath.pop();
    state.currentNodeId = last?.fromNodeId || "root";
    state.resultNodeId  = null;
    state.screen        = "symptoms";
  } else if (state.screen === "symptoms") {
    if (state.symptomPath.length === 0) {
      state.screen = "screening";
    } else {
      const last = state.symptomPath.pop();
      state.currentNodeId = last?.fromNodeId || "root";
    }
  }
  render();
}

function goScreening() { state.screen = "screening"; render(); }

function goLang() {
  Object.assign(state, {
    lang:"en", screen:"lang",
    rfChecked: new Set(), bgChecked: new Set(),
    symptomPath:[], currentNodeId:"root", resultNodeId:null,
  });
  render();
}

// ── Initialise ────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
